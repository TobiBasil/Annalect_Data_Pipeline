version: 2

seeds:
  - name: clean_users
    description: "Raw user records seeded from the Part 1 ingestion pipeline."
    columns:
      - name: email
        tests:
          - not_null
          - unique

models:
  - name: stg_users
    description: >
      Staging model. Renames fields to snake_case, casts types, and applies
      light cleaning. Contains no business logic.
    columns:
      - name: email
        description: "User's email address (natural key)."
        tests:
          - not_null
          - unique
      - name: name
        tests:
          - not_null
      - name: gender
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['male', 'female', 'other']
      - name: state
        tests:
          - not_null
      - name: age
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: country
        tests:
          - not_null
      - name: registration_date
        tests:
          - not_null

  - name: int_users_enriched
    description: "Intermediate model adding age_band and registration date parts."
    columns:
      - name: email
        tests:
          - not_null
          - unique
      - name: age_band
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['0-18', '19-25', '26-40', '40+']
      - name: registration_year
        tests:
          - not_null
      - name: registration_month
        tests:
          - not_null

  - name: dim_users
    description: >
      Dimensional user model (SCD Type 1). One row per email, deduplicated to
      the most recently registered record. Includes a stable surrogate key.
    columns:
      - name: user_id
        description: "MD5 surrogate key derived from the email address."
        tests:
          - not_null
          - unique
      - name: email
        tests:
          - not_null
          - unique
      - name: gender
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['male', 'female', 'other']
      - name: state
        tests:
          - not_null
      - name: age_band
        tests:
          - not_null

  - name: top_3_recent_users_per_state
    description: "Analytical view: the 3 most recently registered users per state."
    columns:
      - name: recency_rank
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3]
      - name: state
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null